[package]
name = "chronam"
version = "0.1.0"
edition = "2024"
description = "Modern VHDL development toolkit — CLI"
authors = ["Chronam Contributors"]
license = "MIT"
repository = "https://github.com/Nciibi/chronam"

[[bin]]
name = "chronam"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env", "unicode", "wrap_help"] }
clap_complete = "4"
crossterm = "0.28"
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
colored = "3"
indicatif = "0.17"
chrono = { version = "0.4", features = ["serde"] }
comfy-table = "7"
glob = "0.3"
ignore = "0.4"
whoami = "1"
regex-lite = "0.1"

[profile.release]
opt-level = 3
lto = true
strip = "symbols"
codegen-units = 1
